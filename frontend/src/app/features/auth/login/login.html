<div class="auth-page">
  <!-- Fundo animado -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon">
        <i class="pi pi-box"></i>
      </div>
      <h1 class="logo-name">AgroCRM</h1>
    </div>

    <div class="auth-header">
      <h2>Bem-vindo de volta</h2>
      <p>Entre com suas credenciais para continuar</p>
    </div>

    <!-- Mensagem de erro -->
    <div class="error-banner" *ngIf="errorMsg">
      <i class="pi pi-exclamation-circle"></i>
      <span>{{ errorMsg }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <!-- Email -->
      <div class="form-group">
        <label for="login-email">Email</label>
        <div class="input-wrapper">
          <i class="pi pi-envelope input-icon"></i>
          <input
            id="login-email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <!-- Senha -->
      <div class="form-group">
        <label for="login-password">Senha</label>
        <div class="input-wrapper">
          <i class="pi pi-lock input-icon"></i>
          <input
            id="login-password"
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="toggle-password" (click)="togglePassword()" tabindex="-1">
            <i class="pi" [ngClass]="showPassword ? 'pi-eye-slash' : 'pi-eye'"></i>
          </button>
        </div>
      </div>

      <!-- Botão -->
      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Entrar</span>
        <span *ngIf="loading" class="btn-loading">
          <i class="pi pi-spin pi-spinner"></i> Entrando...
        </span>
      </button>
    </form>

    <p class="auth-link">
      Não tem uma conta?
      <a routerLink="/cadastro">Cadastre-se</a>
    </p>
  </div>
</div>
