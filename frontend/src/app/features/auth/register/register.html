<div class="auth-page">
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon"><i class="pi pi-box"></i></div>
      <h1 class="logo-name">AgroCRM</h1>
    </div>

    <div class="auth-header">
      <h2>Criar conta</h2>
      <p>Preencha os dados para se cadastrar</p>
    </div>

    <div class="error-banner" *ngIf="errorMsg">
      <i class="pi pi-exclamation-circle"></i>
      <span>{{ errorMsg }}</span>
    </div>

    <div class="success-banner" *ngIf="successMsg">
      <i class="pi pi-check-circle"></i>
      <span>{{ successMsg }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="reg-name">Nome completo</label>
        <div class="input-wrapper">
          <i class="pi pi-user input-icon"></i>
          <input
            id="reg-name"
            type="text"
            [(ngModel)]="name"
            name="name"
            placeholder="Seu nome"
            autocomplete="name"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="reg-email">Email</label>
        <div class="input-wrapper">
          <i class="pi pi-envelope input-icon"></i>
          <input
            id="reg-email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="reg-password">Senha</label>
        <div class="input-wrapper">
          <i class="pi pi-lock input-icon"></i>
          <input
            id="reg-password"
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="Mínimo 6 caracteres"
            autocomplete="new-password"
            minlength="6"
            required
          />
          <button type="button" class="toggle-password" (click)="togglePassword()" tabindex="-1">
            <i class="pi" [ngClass]="showPassword ? 'pi-eye-slash' : 'pi-eye'"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="reg-confirm">Confirmar senha</label>
        <div class="input-wrapper">
          <i class="pi pi-lock input-icon"></i>
          <input
            id="reg-confirm"
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="Repita a senha"
            autocomplete="new-password"
            required
          />
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Criar conta</span>
        <span *ngIf="loading" class="btn-loading">
          <i class="pi pi-spin pi-spinner"></i> Criando...
        </span>
      </button>
    </form>

    <p class="auth-link">
      Já tem uma conta?
      <a routerLink="/login">Entrar</a>
    </p>
  </div>
</div>
