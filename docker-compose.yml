version: "3.8"

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: agrocrm_db
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - agrocrm_network

  backend:
    build: ./backend
    container_name: agrocrm_backend
    environment:
      - DB_TYPE=${DB_TYPE}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    networks:
      - agrocrm_network

  frontend:
    build: ./frontend
    container_name: agrocrm_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - agrocrm_network

networks:
  agrocrm_network:
    driver: bridge

volumes:
  pgdata:
